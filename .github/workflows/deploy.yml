name: $bog_ssg

permissions: write-all

on:
    workflow_dispatch:
    push:
    pull_request:
    delete:

concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            # $mol SSG
            - uses: hyoo-ru/mam_build@master2
              with:
                  package: "bog/ssg"

            - uses: b-on-g/mol-prerender-action@main
              if: github.ref == 'refs/heads/master'
              with:
                  folder: "bog/ssg/-"
                  base-url: "https://dev-cmyser.github.io/ssg/"
                  screens: |
                      index
                      about

            # Eleventy
            - name: Install Eleventy
              run: cd bog/ssg/eleventy && npm install

            - name: Build Eleventy
              run: cd bog/ssg/eleventy && npx @11ty/eleventy

            - name: Merge Eleventy into app
              if: github.ref == 'refs/heads/master'
              run: |
                  mkdir -p bog/ssg/-/eleventy
                  cp -r bog/ssg/eleventy/_site/* bog/ssg/-/eleventy/

            # Deploy
            - uses: hyoo-ru/gh-deploy@v4.4.1
              if: github.ref == 'refs/heads/master'
              with:
                  folder: "bog/ssg/-"

            - name: Deploy feature branch
              if: startsWith(github.ref, 'refs/heads/feature/')
              uses: hyoo-ru/gh-deploy@v4.4.1
              with:
                  folder: "bog/ssg/-"
                  target-folder: ${{ github.ref_name }}

    cleanup:
        if: github.event_name == 'delete' && startsWith(github.event.ref, 'feature/')
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: gh-pages

            - name: Remove feature folder
              run: |
                  BRANCH_NAME="${{ github.event.ref }}"
                  FOLDER="feature/${BRANCH_NAME#feature/}"
                  if [ -d "$FOLDER" ]; then
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git rm -rf "$FOLDER"
                    git commit -m "Clean up preview for deleted branch: $BRANCH_NAME"
                    git push
                  fi
